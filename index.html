<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Floating Love Scene</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap"
  rel="stylesheet"
/>

<style>
  :root {
    --bg-1: #07050b;
    --bg-2: #120918;
    --bg-3: #241029;
    --text: #fff4f7;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    overflow: hidden;
    color: var(--text);
    font-family: "Quicksand", "Trebuchet MS", sans-serif;
    background:
      radial-gradient(circle at 20% 10%, rgba(255, 130, 170, 0.14), transparent 38%),
      radial-gradient(circle at 85% 78%, rgba(255, 170, 200, 0.12), transparent 42%),
      linear-gradient(155deg, var(--bg-1), var(--bg-2) 42%, var(--bg-3));
  }

  canvas {
    display: block;
  }

  .music-toggle {
    border: 1px solid rgba(255, 255, 255, 0.24);
    border-radius: 999px;
    padding: 10px 14px;
    color: #fff8fb;
    background: rgba(24, 10, 30, 0.62);
    font: 700 12px "Quicksand", "Trebuchet MS", sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    backdrop-filter: blur(5px);
  }

  .music-toggle:hover {
    background: rgba(36, 14, 45, 0.76);
  }

  .music-controls {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .volume-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.22);
    background: rgba(24, 10, 30, 0.62);
    backdrop-filter: blur(5px);
  }

  .volume-wrap label {
    font: 700 11px "Quicksand", "Trebuchet MS", sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #ffd8e7;
  }

  .volume-wrap input[type="range"] {
    width: 92px;
    accent-color: #ff7da6;
    cursor: pointer;
  }

  .love-toast {
    position: fixed;
    top: 16px;
    left: 50%;
    z-index: 11;
    transform: translate(-50%, -8px);
    opacity: 0;
    transition: opacity 260ms ease, transform 260ms ease;
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.24);
    background: rgba(34, 10, 34, 0.66);
    color: #ffeaf2;
    font: 700 12px "Quicksand", "Trebuchet MS", sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
    pointer-events: none;
    backdrop-filter: blur(5px);
  }

  .love-toast.show {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  @media (max-width: 640px) {
    .music-controls {
      top: auto;
      bottom: 52px;
      right: 10px;
      left: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .love-toast {
      top: 12px;
      width: calc(100vw - 24px);
      max-width: 340px;
    }
  }
</style>
</head>

<body>
<div class="love-toast" id="loveToast"></div>
<div class="music-controls">
  <button class="music-toggle" id="musicToggle" type="button">Play Music</button>
  <div class="volume-wrap">
    <label for="volumeControl">Volume</label>
    <input id="volumeControl" type="range" min="0" max="100" value="45" />
  </div>
</div>
<audio
  id="bgMusic"
  src="./music/constellations.mp3"
  loop
  preload="auto"
></audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.domElement.style.touchAction = "manipulation";
  renderer.domElement.style.pointerEvents = "auto";
  document.body.appendChild(renderer.domElement);

  camera.position.set(0, 0, 32);

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
  scene.add(ambientLight);

  const light = new THREE.PointLight(0xffc0d8, 1.2, 220);
  light.position.set(0, 20, 20);
  scene.add(light);

  const messages = [
    "I LOVE YOU BABY ❤️",
    "MY FOREVER ❤️",
    "YOU ARE MY WORLD ❤️",
    "MWAHHH 💋",
    "LOVE YOU ALWAYS ❤️",
    "FOREVER TOGETHER ❤️"
  ];

  function createTextTexture(text) {
    const canvas = document.createElement("canvas");
    canvas.width = 1024;
    canvas.height = 512;

    const ctx = canvas.getContext("2d");

    // Keep card transparent so only text and glow are visible.
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = "700 80px Quicksand";

    ctx.shadowColor = "rgba(255, 120, 165, 0.65)";
    ctx.shadowBlur = 28;

    ctx.fillStyle = "rgba(255, 255, 255, 0.98)";
    ctx.fillText(text, canvas.width / 2, canvas.height / 2);

    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
  }

  function createLovePanel() {
    const message = messages[Math.floor(Math.random() * messages.length)];
    const texture = createTextTexture(message);

    const geometry = new THREE.PlaneGeometry(11, 5.5);
    const material = new THREE.MeshBasicMaterial({
      map: texture,
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide
    });

    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.x = (Math.random() - 0.5) * 90;
    mesh.position.y = (Math.random() - 0.5) * 56;
    mesh.position.z = (Math.random() - 0.5) * 160;

    mesh.userData = {
      speed: 0.08 + Math.random() * 0.06,
      twirl: (Math.random() - 0.5) * 0.004
    };

    scene.add(mesh);
    return mesh;
  }

  const panels = [];
  for (let i = 0; i < 56; i++) {
    panels.push(createLovePanel());
  }

  const loader = new THREE.TextureLoader();
  loader.setCrossOrigin("anonymous");

  const warmMessages = [
    "You make my heart smile",
    "Every moment with you shines",
    "You are my favorite person",
    "My safe place is you",
    "Forever starts with us",
    "You are pure magic"
  ];

  function createPhoto(url, index, total) {
    const texture = loader.load(url);

    const photoSize = isMobile ? 5.2 : 7.8;
    const geometry = new THREE.PlaneGeometry(photoSize, photoSize);
    const material = new THREE.MeshBasicMaterial({
      map: texture,
      transparent: true,
      side: THREE.DoubleSide
    });

    const mesh = new THREE.Mesh(geometry, material);

    if (isMobile) {
      // Mobile gets a denser, centered layout so more photos are visible at once.
      const cols = 3;
      const rows = Math.ceil(total / cols);
      const col = index % cols;
      const row = Math.floor(index / cols);
      const xSpan = 30;
      const ySpan = 26;
      const xStep = xSpan / (cols - 1);
      const yStep = ySpan / Math.max(1, rows - 1);

      mesh.position.x = -xSpan / 2 + col * xStep + (Math.random() - 0.5) * 1.8;
      mesh.position.y = ySpan / 2 - row * yStep + (Math.random() - 0.5) * 1.4;
      mesh.position.z = -18 + (Math.random() - 0.5) * 30;
    } else {
      mesh.position.x = (Math.random() - 0.5) * 72;
      mesh.position.y = (Math.random() - 0.5) * 52;
      mesh.position.z = (Math.random() - 0.5) * 130;
    }

    mesh.userData = {
      spin: 0.0008 + Math.random() * 0.0007,
      bobOffset: Math.random() * Math.PI * 2,
      baseY: mesh.position.y,
      baseZ: mesh.position.z,
      bobAmp: isMobile ? 0.11 : 0.18,
      focusWeight: 0
    };

    scene.add(mesh);
    return mesh;
  }

  const photos = [];
  const isMobile = window.matchMedia("(max-width: 768px)").matches;
  const photoCount = isMobile ? 10 : 15;
  const personalPhotoPaths = [
    "./images/IMG-20260306-WA0058.jpg",
    "./images/IMG-20260306-WA0059.jpg",
    "./images/IMG-20260306-WA0064.jpg",
    "./images/IMG-20260306-WA0065.jpg",
    "./images/IMG-20260306-WA0066.jpg",
    "./images/IMG-20260306-WA0072.jpg",
    "./images/IMG-20260306-WA0075.jpg",
    "./images/IMG-20260306-WA0078.jpg",
    "./images/IMG-20260306-WA0079.jpg"
  ];

  for (let i = 0; i < photoCount; i++) {
    const src = personalPhotoPaths[i % personalPhotoPaths.length];
    photos.push(createPhoto(src, i, photoCount));
  }

  function createHeartSpriteTexture() {
    const size = 128;
    const canvas = document.createElement("canvas");
    canvas.width = size;
    canvas.height = size;

    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, size, size);

    const cx = size / 2;
    const cy = size * 0.58;
    const scale = size * 0.022;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, -scale);

    // Draw a classic heart curve as a filled sprite.
    ctx.beginPath();
    for (let i = 0; i <= 180; i++) {
      const t = (i / 180) * Math.PI;
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y =
        13 * Math.cos(t) -
        5 * Math.cos(2 * t) -
        2 * Math.cos(3 * t) -
        Math.cos(4 * t);
      if (i === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    }
    ctx.closePath();

    const fill = ctx.createLinearGradient(-10, 14, 10, -12);
    fill.addColorStop(0, "#ff4f7c");
    fill.addColorStop(1, "#ff9bb7");
    ctx.fillStyle = fill;
    ctx.shadowColor = "rgba(255, 120, 160, 0.85)";
    ctx.shadowBlur = 12;
    ctx.fill();

    ctx.restore();

    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
  }

  const heartTexture = createHeartSpriteTexture();
  const hearts = [];
  const burstHearts = [];
  const glowRings = [];

  function createGlowRingTexture() {
    const size = 256;
    const canvas = document.createElement("canvas");
    canvas.width = size;
    canvas.height = size;

    const ctx = canvas.getContext("2d");
    const cx = size / 2;
    const cy = size / 2;

    ctx.clearRect(0, 0, size, size);

    const inner = size * 0.22;
    const outer = size * 0.47;
    const ring = ctx.createRadialGradient(cx, cy, inner, cx, cy, outer);
    ring.addColorStop(0, "rgba(255, 255, 255, 0)");
    ring.addColorStop(0.45, "rgba(255, 220, 235, 0.9)");
    ring.addColorStop(0.72, "rgba(255, 140, 185, 0.75)");
    ring.addColorStop(1, "rgba(255, 120, 170, 0)");

    ctx.fillStyle = ring;
    ctx.beginPath();
    ctx.arc(cx, cy, outer, 0, Math.PI * 2);
    ctx.fill();

    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
  }

  const glowRingTexture = createGlowRingTexture();

  for (let i = 0; i < 240; i++) {
    const shade = 0.78 + Math.random() * 0.22;
    const heartMaterial = new THREE.SpriteMaterial({
      map: heartTexture,
      color: new THREE.Color(1, shade * 0.7, shade * 0.82),
      transparent: true,
      opacity: 0.9
    });

    const heart = new THREE.Sprite(heartMaterial);
    heart.position.x = (Math.random() - 0.5) * 100;
    heart.position.y = (Math.random() - 0.5) * 70;
    heart.position.z = (Math.random() - 0.5) * 170;
    const baseSize = 0.55 + Math.random() * 0.95;
    heart.scale.set(baseSize, baseSize, 1);

    heart.userData = {
      rise: 0.02 + Math.random() * 0.04,
      drift: (Math.random() - 0.5) * 0.014,
      baseSize,
      pulseOffset: Math.random() * Math.PI * 2
    };

    scene.add(heart);
    hearts.push(heart);
  }

  function spawnHeartBurst(center) {
    const total = isMobile ? 34 : 48;

    for (let i = 0; i < total; i++) {
      const material = new THREE.SpriteMaterial({
        map: heartTexture,
        color: new THREE.Color(1, 0.55 + Math.random() * 0.3, 0.72 + Math.random() * 0.2),
        transparent: true,
        opacity: 1,
        depthWrite: false
      });

      const sprite = new THREE.Sprite(material);
      const size = 0.62 + Math.random() * 1.05;
      sprite.scale.set(size, size, 1);
      sprite.position.copy(center);
      scene.add(sprite);

      const velocity = new THREE.Vector3(
        (Math.random() - 0.5) * 0.38,
        (Math.random() - 0.35) * 0.34,
        (Math.random() - 0.5) * 0.38
      );

      burstHearts.push({
        sprite,
        velocity,
        life: 1.15,
        decay: 0.01 + Math.random() * 0.009
      });
    }
  }

  function spawnGlowRing(center) {
    const material = new THREE.SpriteMaterial({
      map: glowRingTexture,
      color: new THREE.Color(1, 0.8, 0.9),
      transparent: true,
      opacity: 0.95,
      depthWrite: false
    });

    const ring = new THREE.Sprite(material);
    ring.position.copy(center);
    ring.position.z -= 0.8;
    const startSize = isMobile ? 5.6 : 7.4;
    ring.scale.set(startSize, startSize, 1);
    scene.add(ring);

    glowRings.push({
      ring,
      life: 1,
      decay: isMobile ? 0.028 : 0.024,
      growth: isMobile ? 0.28 : 0.34
    });
  }

  const raycaster = new THREE.Raycaster();
  const pointer = new THREE.Vector2();
  const cameraTargetPos = camera.position.clone();
  const cameraLookTarget = new THREE.Vector3(0, 0, 0);
  const focusCameraOffset = new THREE.Vector3();
  const domRect = { left: 0, top: 0, width: 1, height: 1 };
  let selectedPhoto = null;
  let selectedPhotoUntil = 0;
  let flyTargetPhoto = null;
  let nextFlySwitchAt = 0;

  const loveToast = document.getElementById("loveToast");
  let toastTimerId = 0;

  function showLoveToast(text) {
    loveToast.textContent = text;
    loveToast.classList.add("show");

    clearTimeout(toastTimerId);
    toastTimerId = window.setTimeout(() => {
      loveToast.classList.remove("show");
    }, 2100);
  }

  function updatePointerFromClient(clientX, clientY) {
    const rect = renderer.domElement.getBoundingClientRect();
    domRect.left = rect.left;
    domRect.top = rect.top;
    domRect.width = rect.width;
    domRect.height = rect.height;

    if (
      clientX < domRect.left ||
      clientX > domRect.left + domRect.width ||
      clientY < domRect.top ||
      clientY > domRect.top + domRect.height
    ) {
      return false;
    }

    pointer.x = ((clientX - domRect.left) / domRect.width) * 2 - 1;
    pointer.y = -((clientY - domRect.top) / domRect.height) * 2 + 1;

    return true;
  }

  function getPhotoHitByRaycast() {
    raycaster.setFromCamera(pointer, camera);
    const intersections = raycaster.intersectObjects(photos, false);
    return intersections.length > 0 ? intersections[0].object : null;
  }

  function getPhotoHitByProjectedBounds() {
    const center = new THREE.Vector3();
    const edgeX = new THREE.Vector3();
    const edgeY = new THREE.Vector3();
    const worldEdgeX = new THREE.Vector3();
    const worldEdgeY = new THREE.Vector3();

    const px = ((pointer.x + 1) * 0.5) * domRect.width;
    const py = ((1 - pointer.y) * 0.5) * domRect.height;

    let winner = null;
    let nearestCameraDist = Infinity;

    for (const photo of photos) {
      const width = (photo.geometry.parameters.width * photo.scale.x) / 2;
      const height = (photo.geometry.parameters.height * photo.scale.y) / 2;

      center.copy(photo.position).project(camera);
      if (center.z < -1 || center.z > 1) {
        continue;
      }

      worldEdgeX.copy(photo.position).add(new THREE.Vector3(width, 0, 0));
      worldEdgeY.copy(photo.position).add(new THREE.Vector3(0, height, 0));
      edgeX.copy(worldEdgeX).project(camera);
      edgeY.copy(worldEdgeY).project(camera);

      const cx = ((center.x + 1) * 0.5) * domRect.width;
      const cy = ((1 - center.y) * 0.5) * domRect.height;

      const halfW = Math.max(14, Math.abs(edgeX.x - center.x) * domRect.width * 0.5 * 1.35);
      const halfH = Math.max(14, Math.abs(edgeY.y - center.y) * domRect.height * 0.5 * 1.35);

      const inside = Math.abs(px - cx) <= halfW && Math.abs(py - cy) <= halfH;
      if (!inside) {
        continue;
      }

      const cameraDist = camera.position.distanceToSquared(photo.position);
      if (cameraDist < nearestCameraDist) {
        nearestCameraDist = cameraDist;
        winner = photo;
      }
    }

    return winner;
  }

  function getNearestPhotoFallback() {
    let nearest = null;
    let minDistSq = Infinity;
    const temp = new THREE.Vector3();

    for (const photo of photos) {
      temp.copy(photo.position).project(camera);

      if (temp.z < -1 || temp.z > 1) {
        continue;
      }

      const dx = pointer.x - temp.x;
      const dy = pointer.y - temp.y;
      const distSq = dx * dx + dy * dy;

      if (distSq < minDistSq) {
        minDistSq = distSq;
        nearest = photo;
      }
    }

    return nearest;
  }

  function getClosestVisiblePhotoToPointer() {
    let nearest = null;
    let minDistSq = Infinity;
    const temp = new THREE.Vector3();

    for (const photo of photos) {
      temp.copy(photo.position).project(camera);

      if (temp.z < -1 || temp.z > 1) {
        continue;
      }

      const dx = pointer.x - temp.x;
      const dy = pointer.y - temp.y;
      const distSq = dx * dx + dy * dy;

      if (distSq < minDistSq) {
        minDistSq = distSq;
        nearest = photo;
      }
    }

    const maxDist = isMobile ? 0.42 : 0.3;
    return minDistSq <= maxDist * maxDist ? nearest : null;
  }

  function selectPhoto(photo) {
    selectedPhoto = photo;
    selectedPhotoUntil = performance.now() + 2500;
    photo.userData.focusWeight = Math.max(photo.userData.focusWeight, 0.35);
    spawnGlowRing(photo.position);
    spawnHeartBurst(photo.position);

    const warmText = warmMessages[Math.floor(Math.random() * warmMessages.length)];
    showLoveToast(warmText);
  }

  function handlePhotoInteraction(clientX, clientY) {
    const isInsideCanvas = updatePointerFromClient(clientX, clientY);
    if (!isInsideCanvas || photos.length === 0) {
      return false;
    }

    const hitPhoto =
      getClosestVisiblePhotoToPointer() ||
      getPhotoHitByProjectedBounds() ||
      getPhotoHitByRaycast() ||
      getNearestPhotoFallback() ||
      photos[Math.floor(Math.random() * photos.length)];

    selectPhoto(hitPhoto);
    return true;
  }

  function isUiTarget(target) {
    return Boolean(
      target &&
      target.closest &&
      (target.closest(".music-controls") || target.closest(".love-toast"))
    );
  }

  function pickFlyTarget(now) {
    if (photos.length === 0) {
      return;
    }

    flyTargetPhoto = photos[Math.floor(Math.random() * photos.length)];
    nextFlySwitchAt = now + (isMobile ? 2200 : 3200) + Math.random() * 1800;
  }

  let lastTouchAt = 0;

  renderer.domElement.addEventListener("pointerdown", (event) => {
    if (!isUiTarget(event.target)) {
      handlePhotoInteraction(event.clientX, event.clientY);
    }
  }, true);

  renderer.domElement.addEventListener("touchstart", (event) => {
    if (isUiTarget(event.target)) {
      return;
    }

    if (event.touches.length > 0) {
      const touch = event.touches[0];
      handlePhotoInteraction(touch.clientX, touch.clientY);
    }
  }, { passive: true, capture: true });

  window.addEventListener("pointerup", (event) => {
    if (!isUiTarget(event.target)) {
      handlePhotoInteraction(event.clientX, event.clientY);
    }
  });

  window.addEventListener("touchend", (event) => {
    if (isUiTarget(event.target)) {
      return;
    }

    if (event.changedTouches.length > 0) {
      const touch = event.changedTouches[0];
      handlePhotoInteraction(touch.clientX, touch.clientY);
      lastTouchAt = performance.now();
    }
  }, { passive: true });

  window.addEventListener("click", (event) => {
    if (performance.now() - lastTouchAt < 450) {
      return;
    }

    if (!isUiTarget(event.target)) {
      handlePhotoInteraction(event.clientX, event.clientY);
    }
  });

  renderer.domElement.addEventListener("pointermove", (event) => {
    const canCheck = updatePointerFromClient(event.clientX, event.clientY);
    const hitPhoto = canCheck ? (getPhotoHitByRaycast() || getPhotoHitByProjectedBounds()) : null;
    renderer.domElement.style.cursor = hitPhoto ? "pointer" : "default";
  });

  const music = document.getElementById("bgMusic");
  const musicToggle = document.getElementById("musicToggle");
  const volumeControl = document.getElementById("volumeControl");
  let musicPlaying = false;
  let musicVolume = Number(volumeControl.value) / 100;

  music.volume = musicVolume;

  async function setMusicState(shouldPlay) {
    if (shouldPlay) {
      music.volume = musicVolume;
      try {
        await music.play();
        musicPlaying = true;
      } catch {
        musicPlaying = false;
      }
    } else {
      music.pause();
      musicPlaying = false;
    }

    musicToggle.textContent = musicPlaying ? "Pause Music" : "Play Music";
  }

  musicToggle.addEventListener("click", () => {
    setMusicState(!musicPlaying);
  });

  volumeControl.addEventListener("input", () => {
    musicVolume = Number(volumeControl.value) / 100;
    music.volume = musicVolume;
  });

  let t = 0;

  function animate() {
    requestAnimationFrame(animate);

    t += 0.006;
    const now = performance.now();

    for (const panel of panels) {
      panel.rotation.y += panel.userData.twirl;
      panel.position.z += panel.userData.speed;
      panel.position.x += Math.sin(t + panel.position.y * 0.03) * 0.01;

      if (panel.position.z > 50) {
        panel.position.z = -140;
      }
    }

    for (const photo of photos) {
      photo.rotation.y += photo.userData.spin;
      photo.position.y =
        photo.userData.baseY +
        Math.sin(t + photo.userData.bobOffset) * photo.userData.bobAmp;

      const isSelected = selectedPhoto === photo && now < selectedPhotoUntil;
      const targetFocusWeight = isSelected ? 1 : 0;
      photo.userData.focusWeight += (targetFocusWeight - photo.userData.focusWeight) * 0.11;

      const focusBoostZ = isMobile ? 8 : 12;
      photo.position.z = photo.userData.baseZ + photo.userData.focusWeight * focusBoostZ;

      const scaleBoost = 1 + photo.userData.focusWeight * 0.55;
      photo.scale.set(scaleBoost, scaleBoost, 1);
    }

    if (selectedPhoto && now >= selectedPhotoUntil) {
      selectedPhoto = null;
    }

    for (const heart of hearts) {
      heart.position.y += heart.userData.rise;
      heart.position.x += heart.userData.drift;
      const pulse = 0.14 * Math.sin(t * 2 + heart.userData.pulseOffset);
      const s = heart.userData.baseSize + pulse;
      heart.scale.set(s, s, 1);

      if (heart.position.y > 45) {
        heart.position.y = -45;
      }
      if (heart.position.x > 55 || heart.position.x < -55) {
        heart.userData.drift *= -1;
      }
    }

    for (let i = burstHearts.length - 1; i >= 0; i--) {
      const burst = burstHearts[i];
      burst.sprite.position.add(burst.velocity);
      burst.velocity.multiplyScalar(0.965);
      burst.velocity.y += 0.0025;
      burst.life -= burst.decay;

      burst.sprite.material.opacity = Math.max(0, burst.life);

      const burstScale = burst.sprite.scale.x + 0.028;
      burst.sprite.scale.set(burstScale, burstScale, 1);

      if (burst.life <= 0) {
        scene.remove(burst.sprite);
        burst.sprite.material.dispose();
        burstHearts.splice(i, 1);
      }
    }

    for (let i = glowRings.length - 1; i >= 0; i--) {
      const glow = glowRings[i];
      glow.life -= glow.decay;
      glow.ring.material.opacity = Math.max(0, glow.life);

      const ringScale = glow.ring.scale.x + glow.growth;
      glow.ring.scale.set(ringScale, ringScale, 1);

      if (glow.life <= 0) {
        scene.remove(glow.ring);
        glow.ring.material.dispose();
        glowRings.splice(i, 1);
      }
    }

    const hasSelectedPhoto = selectedPhoto && now < selectedPhotoUntil;

    if (!hasSelectedPhoto && (flyTargetPhoto === null || now > nextFlySwitchAt)) {
      pickFlyTarget(now);
    }

    if (hasSelectedPhoto) {
      focusCameraOffset.subVectors(camera.position, selectedPhoto.position);
      if (focusCameraOffset.lengthSq() < 0.001) {
        focusCameraOffset.set(0, 0, 1);
      }

      focusCameraOffset.normalize();
      const focusDistance = isMobile ? 6.4 : 8;
      cameraTargetPos.copy(selectedPhoto.position).addScaledVector(focusCameraOffset, focusDistance);
      cameraLookTarget.lerp(selectedPhoto.position, 0.18);
    } else if (flyTargetPhoto) {
      const phase = now * 0.00055;
      const zOffset = isMobile ? 9.5 : 12.5;
      const xOrbit = isMobile ? 2.8 : 4.2;
      const yOrbit = isMobile ? 1.5 : 2.3;

      cameraTargetPos.set(
        flyTargetPhoto.position.x + Math.cos(phase) * xOrbit,
        flyTargetPhoto.position.y + Math.sin(phase * 1.2) * yOrbit,
        flyTargetPhoto.position.z + zOffset + Math.sin(phase * 0.8) * 1.4
      );
      cameraLookTarget.lerp(flyTargetPhoto.position, 0.05);
    }

    camera.position.lerp(cameraTargetPos, hasSelectedPhoto ? 0.12 : 0.03);
    camera.lookAt(cameraLookTarget);

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  });
</script>
</body>
</html>
